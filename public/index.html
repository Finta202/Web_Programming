<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Web stranica o filmovima s tablicom podataka, filtriranjem i košaricom za posudbu.">

    <title>Filmovi - Početna</title>
    <link rel="stylesheet" href="style/style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>

    <header>
        <h1>Dobrodošli na moju web stranicu o filmovima i serijama</h1>
    </header>

    <nav aria-label="Primarna navigacija" class="nav">
        <div class="menu-btn" aria-hidden="true">☰ Menu</div>
        <ul class="menu">
            <li><a href="/index.html">Početna</a></li>
            <li><a href="/grafikon.html">Grafikon</a></li>
            <li><a href="/slike">Galerija</a></li>
        </ul>
    </nav>

    <main>
        <section class="content" aria-labelledby="filmovi-naslov">
            <div class="table-wrapper">
                <h2 id="filmovi-naslov">Popis filmova i serija</h2>

                <div id="filteri">
                    <input type="text" id="filter-naslov" placeholder="Pretraži naslov">

                    <select id="filter-zanr">
                        <option value="">Svi žanrovi</option>
                    </select>

                    <label for="filter-godina-od">Godina od</label>
                    <input type="number" id="filter-godina-od" min="1954" max="2026" class="godina-box">

                    <label for="filter-godina-do">do</label>
                    <input type="number" id="filter-godina-do" min="1954" max="2026" class="godina-box">

                    <div class="radio-grupa">
                        <span>Trajanje:</span>

                        <label>
                            <input type="radio" name="filter-trajanje" value="" checked>
                            Svi
                        </label>

                        <label>
                            <input type="radio" name="filter-trajanje" value="kratki">
                            Do 90 min
                        </label>

                        <label>
                            <input type="radio" name="filter-trajanje" value="srednji">
                            90–120 min
                        </label>

                        <label>
                            <input type="radio" name="filter-trajanje" value="dugi">
                            Više od 120 min
                        </label>
                    </div>

                    <label for="filter-ocjena">Minimalna ocjena</label>
                    <select id="filter-ocjena">
                        <option value="0">Sve ocjene</option>
                        <option value="5">5+</option>
                        <option value="6">6+</option>
                        <option value="7">7+</option>
                        <option value="8">8+</option>
                        <option value="9">9+</option>
                    </select>

                    <button id="reset-filtera">Resetiraj</button>
                </div>

                <table id="filmovi-tablica" aria-label="Tablica s popisom filmova">
                    <thead>
                        <tr>
                            <th>Naslov</th>
                            <th>Žanr</th>
                            <th>Godina</th>
                            <th>Trajanje</th>
                            <th>Država</th>
                            <th>Ocjena</th>
                            <th>Akcija</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Podaci se učitavaju pomoću JavaScripta -->
                    </tbody>
                </table>
            </div>

            <aside class="sidebar" aria-labelledby="galerija-naslov">
                <h2 id="galerija-naslov">Galerija</h2>

                <picture>
                    <source media="(max-width: 768px)" srcset="deadbang.jpg">
                    <img src="/images/Dead Bang.jpg" alt="Filmski poster filma Dead-Bang" class="aside-img">
                </picture>

                <picture>
                    <source media="(max-width: 768px)" srcset="madonna.jpg">
                    <img src="/images/Madonna.jpg" alt="Poster dokumentarnog filma In Bed With Madonna" class="aside-img">
                </picture>

                <picture>
                    <source media="(max-width: 768px)" srcset="failsafe.jpg">
                    <img src="/images/Fail Safe.jpg" alt="Poster filma Fail-Safe" class="aside-img">
                </picture>

                <div id="kosarica">
                    <h2>Košarica</h2>

                    <ul id="lista-kosarice">
                        <li>Košarica je prazna.</li>
                    </ul>

                    <button id="potvrdi-kosaricu">Potvrdi posudbu</button>

                    <p id="poruka-kosarice"></p>
                </div>
            </aside>
        </section>
    </main>

    <footer>
        <p>&copy; 2026. Web Programiranje</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
